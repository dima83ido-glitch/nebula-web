<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ORION NEBULA</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 15px; margin: 10px; border-radius: 8px; }
        input { width: 80%; padding: 10px; margin: 5px; background: #010409; color: white; border: 1px solid #30363d; }
        button { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .back-btn { background: #30363d; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="loginPage" class="page active">
        <h2>Nebula Login</h2>
        <input type="text" id="l" placeholder="Логин">
        <input type="password" id="p" placeholder="Пароль">
        <button onclick="nav('menu')">Войти</button>
    </div>

    <div id="menu" class="page">
        <h2>Управление ORION</h2>
        <button onclick="nav('accs')">📱 Мои Аккаунты</button><br><br>
        <button onclick="nav('add')">➕ Добавить Аккаунт</button>
    </div>

    <div id="accs" class="page">
        <button class="back-btn" onclick="nav('menu')">← Назад</button>
        <div id="list">Загрузка...</div>
    </div>

    <div id="add" class="page">
        <button class="back-btn" onclick="nav('menu')">← Назад</button>
        <input id="api_id" placeholder="API ID">
        <input id="api_hash" placeholder="API Hash">
        <input id="phone" placeholder="+380...">
        <button onclick="step1()">Получить код</button>
        <div id="otp" style="display:none"><input id="code" placeholder="Код"><button onclick="step2()">Ок</button></div>
    </div>

    <script>
        const URL = "https://ТВОЙ-RENDER.onrender.com";
        let user = "";

        function nav(id) {
            if(id === 'menu') user = document.getElementById('l').value;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'accs') load();
        }

        async function load() {
            const r = await fetch(URL+'/list', {method:'POST', body: JSON.stringify({login:user})});
            const d = await r.json();
            document.getElementById('list').innerHTML = d.sessions.map(s => `<div class="card">${s} <button onclick="del('${s}')" style="background:red">Удалить</button></div>`).join('');
        }

        async function step1() {
            const body = { login: user, phone: document.getElementById('phone').value, api_id: document.getElementById('api_id').value, api_hash: document.getElementById('api_hash').value };
            const r = await fetch(URL+'/auth1', {method:'POST', body: JSON.stringify(body)});
            if((await r.json()).status === "code_sent") document.getElementById('otp').style.display = 'block';
        }

        async function step2() {
            const body = { phone: document.getElementById('phone').value, code: document.getElementById('code').value };
            await fetch(URL+'/auth2', {method:'POST', body: JSON.stringify(body)});
            nav('accs');
        }

        async function del(p) {
            await fetch(URL+'/delete', {method:'POST', body: JSON.stringify({login:user, phone:p})});
            load();
        }
    </script>
</body>
</html>
