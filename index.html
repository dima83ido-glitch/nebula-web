<!DOCTYPE html>
<html>
<head>
    <title>Nebula Control</title>
    <style>
        body { background: #0b0e14; color: #e1e1e1; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1a1f29; padding: 25px; border-radius: 15px; border: 1px solid #30363d; width: 90%; max-width: 400px; margin-top: 50px; box-shadow: 0 0 20px rgba(0,255,255,0.1); }
        h2 { color: #00d2ff; text-align: center; }
        input, button, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        input { background: #0d1117; color: white; border: 1px solid #30363d; }
        button { background: linear-gradient(90deg, #00d2ff, #3a7bd5); color: white; font-weight: bold; cursor: pointer; }
        .chat-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #30363d; }
        #chatList { max-height: 300px; overflow-y: auto; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="card" id="loginCard">
        <h2>ORION TEAM: NEBULA</h2>
        <input type="text" id="login" placeholder="Логин">
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="login()">ВОЙТИ</button>
    </div>

    <div class="card" id="mainCard" style="display:none;">
        <h2>Управление</h2>
        <div id="chatList">Загрузка чатов...</div>
        <textarea id="msg" placeholder="Текст (разные варианты через | )"></textarea>
        <input type="number" id="delay" value="30" placeholder="Задержка (сек)">
        <button onclick="startMailing()">ЗАПУСТИТЬ РАССЫЛКУ</button>
    </div>

    <script>
        const API = "https://ТВОЙ-URL-НА-RENDER.com"; // ЗАМЕНИТЬ ПОСЛЕ ДЕПЛОЯ
        let userData = {};

        async function login() {
            userData = { login: document.getElementById('login').value, password: document.getElementById('pass').value };
            const res = await fetch(`${API}/get_chats`, { method: 'POST', body: JSON.stringify(userData) });
            const data = await res.json();
            if(data.status === "ok") {
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('mainCard').style.display = 'block';
                renderChats(data.chats);
            } else { alert(data.message); }
        }

        function renderChats(chats) {
            const list = document.getElementById('chatList');
            list.innerHTML = chats.map(c => `
                <div class="chat-item">
                    <input type="checkbox" value="${c.id}" class="chat-check" checked> ${c.title}
                </div>
            `).join('');
        }

        async function startMailing() {
            const selected = Array.from(document.querySelectorAll('.chat-check:checked')).map(el => el.value);
            const texts = document.getElementById('msg').value.split('|');
            const delay = document.getElementById('delay').value;
            
            await fetch(`${API}/start_mailing`, {
                method: 'POST',
                body: JSON.stringify({ ...userData, chat_ids: selected, texts, delay })
            });
            alert("Рассылка запущена!");
        }
    </script>
</body>
</html>
