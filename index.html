<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nebula</title>

<style>
body {
margin:0;
background:#070b14;
color:white;
font-family:Arial;
}

.panel {
padding:20px;
}

.card {
background:#0f1725;
padding:15px;
border-radius:15px;
margin-bottom:15px;
border:1px solid #1f2937;
}

button {
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
margin-top:10px;
}

input {
width:100%;
padding:10px;
margin-top:10px;
background:#0b1220;
border:1px solid #2a3441;
color:white;
border-radius:8px;
}

.top {
display:flex;
justify-content:space-between;
padding:15px;
background:#0f1725;
}

.page {display:none}
.active {display:block}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page active panel">
<div class="card">
<h2>NEBULA</h2>
<input id="u" placeholder="login">
<input id="p" type="password" placeholder="password">
<button onclick="login()">Войти</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dash" class="page">

<div class="top">
<div id="user"></div>
<button onclick="logout()">Выход</button>
</div>

<div class="panel">

<div class="card">
<h3>АККАУНТЫ</h3>
<button onclick="loadAccounts()">МОИ АККАУНТЫ</button>
<button onclick="openAdd()">+ ДОБАВИТЬ</button>
</div>

<div class="card">
<h3>РАССЫЛКИ</h3>
<button onclick="alert('будет дальше')">ВСЕ РАССЫЛКИ</button>
</div>

</div>
</div>

<!-- ADD -->
<div id="add" class="page panel">
<div class="card">

<input id="phone" placeholder="phone">
<input id="api_id" placeholder="api id">
<input id="api_hash" placeholder="api hash">

<button onclick="sendCode()">Отправить код</button>

<input id="code" placeholder="code">
<button onclick="verify()">Подтвердить</button>

</div>
</div>

<script>

const API="http://localhost:8080"
let token=""
let auth=""

function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

async function login(){
const r=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
username:u.value,
password:p.value
})})
const d=await r.json()

token=d.token
localStorage.setItem("t",token)

document.getElementById("user").innerText=u.value
show("dash")
}

function logout(){
localStorage.clear()
location.reload()
}

function openAdd(){
show("add")
}

async function sendCode(){
const r=await fetch(API+"/send_code",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({
phone:phone.value,
api_id:api_id.value,
api_hash:api_hash.value
})
})

const d=await r.json()
auth=d.auth_id
alert("код отправлен")
}

async function verify(){
const r=await fetch(API+"/verify_code",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
auth_id:auth,
code:code.value
})
})

alert("готово")
}

async function loadAccounts(){
const r=await fetch(API+"/accounts",{
method:"POST",
headers:{
"Authorization":"Bearer "+token
}
})

const d=await r.json()

alert(JSON.stringify(d.accounts))
}

</script>

</body>
</html>
