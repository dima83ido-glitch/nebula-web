<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION NEBULA PANEL</title>
    <style>
        :root { --neon: #00f2ff; --bg: #0d1117; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .screen { display: none; max-width: 500px; margin: auto; }
        .active { display: block; }
        .btn { background: var(--neon); color: black; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-back { background: #30363d; color: white; margin-bottom: 20px; width: auto; padding: 5px 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #30363d; margin-bottom: 10px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #010409; border: 1px solid #30363d; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="login_screen" class="screen active">
        <h2>NEBULA LOGIN</h2>
        <input type="text" id="user_l" placeholder="Логин">
        <input type="password" id="user_p" placeholder="Пароль">
        <button class="btn" onclick="app.login()">ВОЙТИ</button>
    </div>

    <div id="menu_screen" class="screen">
        <h2>ORION TEAM</h2>
        <button class="btn" onclick="app.showScreen('accounts_screen')">📱 МОИ АККАУНТЫ</button>
        <button class="btn" onclick="app.showScreen('add_acc_screen')">➕ ДОБАВИТЬ АККАУНТ</button>
        <button class="btn" onclick="app.showScreen('create_mail_screen')">🚀 СОЗДАТЬ РАССЫЛКУ</button>
    </div>

    <div id="accounts_screen" class="screen">
        <button class="btn btn-back" onclick="app.showScreen('menu_screen')">← Назад</button>
        <h3>Ваши сессии</h3>
        <div id="acc_list">Загрузка...</div>
    </div>

    <div id="add_acc_screen" class="screen">
        <button class="btn btn-back" onclick="app.showScreen('menu_screen')">← Назад</button>
        <h3>Новый аккаунт</h3>
        <input type="text" id="api_id" placeholder="API ID">
        <input type="text" id="api_hash" placeholder="API Hash">
        <input type="text" id="phone" placeholder="+380...">
        <button class="btn" id="btn_send_code" onclick="app.sendCode()">ПОЛУЧИТЬ КОД</button>
        
        <div id="otp_div" style="display:none">
            <input type="text" id="otp_code" placeholder="Код подтверждения">
            <button class="btn" onclick="app.confirmCode()">ПОДТВЕРДИТЬ</button>
        </div>
    </div>

    <script>
        const API = "https://ТВОЙ-RENDER.onrender.com";
        const app = {
            user: null,
            showScreen(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                if(id === 'accounts_screen') this.loadAccounts();
            },
            login() {
                this.user = document.getElementById('user_l').value;
                this.showScreen('menu_screen');
            },
            async sendCode() {
                const phone = document.getElementById('phone').value;
                const res = await fetch(`${API}/auth/step1`, {
                    method: 'POST',
                    body: JSON.stringify({
                        phone, login: this.user,
                        api_id: document.getElementById('api_id').value,
                        api_hash: document.getElementById('api_hash').value
                    })
                });
                const d = await res.json();
                if(d.status === "code_sent") document.getElementById('otp_div').style.display = 'block';
                else alert(d.message);
            },
            async confirmCode() {
                const res = await fetch(`${API}/auth/step2`, {
                    method: 'POST',
                    body: JSON.stringify({
                        phone: document.getElementById('phone').value,
                        code: document.getElementById('otp_code').value
                    })
                });
                if((await res.json()).status === "success") { alert("Готово!"); this.showScreen('menu_screen'); }
            },
            async loadAccounts() {
                const res = await fetch(`${API}/get_my_accounts`, {method:'POST', body: JSON.stringify({login: this.user})});
                const d = await res.json();
                document.getElementById('acc_list').innerHTML = d.accounts.map(a => `<div class="card">${a} <button style="float:right">Удалить</button></div>`).join('');
            }
        }
    </script>
</body>
</html>
