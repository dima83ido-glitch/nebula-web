<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Nebula</title>

<style>
    body {

    background: #0d121d;
    font-family: 'Inter', sans-serif;
    color: #e2e8f0;
    margin: 0;
}

/* Общие контейнеры */
.page { display: none; padding-bottom: 50px; }
.page.active { display: block; }
.container { padding: 20px; max-width: 500px; margin: 0 auto; }

/* Карточки и Секции */
.section-card {
    background: #111827;
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 20px;
    border: 1px solid #1e293b;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
}

.section-header {
    font-size: 12px;
    font-weight: 800;
    color: #64748b;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Кнопки */
.menu-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 15px;
    margin-bottom: 12px;
    background: #0f172a;
    border: 1px solid #1e293b;
    color: #93c5fd;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
}

.menu-btn:hover { background: #1e293b; transform: translateY(-2px); }

.back-btn {
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    font-size: 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
}

/* Все страницы по умолчанию скрыты */
.page {
    display: none;
}

/* Только страница с классом active становится видимой */
.page.active {
    display: block;
}

/* Инпуты */
input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    background: #0b1120;
    border: 1px solid #334155;
    color: white;
    border-radius: 10px;
    box-sizing: border-box;
}

/* Выбор чатов */
.chat-item {
    padding: 12px;
    margin: 5px 0;
    background: #1e293b;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: 0.2s;
}

.chat-item.selected {
    border-color: #2563eb;
    background: #1e3a8a;
}

.counter-badge {
    background: #2563eb;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
    margin-top: 10px;
    display: inline-block;
}

/* Иконки действий */
.action-icons {
    display: flex;
    gap: 15px;
    font-size: 18px;
}

.icon-edit { color: #fbbf24; cursor: pointer; }
.icon-delete { color: #f87171; cursor: pointer; }
.icon-toggle { color: #4ade80; cursor: pointer; }
</style>
</head>

    <div class="container">

<script>

const API = "https://nebula-web-nwdf.onrender.com"
let currentUser = ""
let auth_id = ""

function openPage(pageId) {
    // 1. Убираем класс 'active' у всех страниц (скрываем их)
    document.querySelectorAll('.page').forEach(page => {
        page.classList.remove('active');
    });

    // 2. Находим нужную страницу по ID
    const target = document.getElementById(pageId);

    // 3. Если страница нашлась — делаем ее видимой
    if (target) {
        target.classList.add('active');
    }

    // 4. Скроллим в самый верх (плавно), чтобы страница не открылась "снизу"
    window.scrollTo({
        top: 0,
        behavior: 'smooth'
    });
}

async function login(){

const r = await fetch(API+"/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:document.getElementById("loginUsername").value,
password:document.getElementById("loginPassword").value,
remember:document.getElementById("remember").checked
})
})

const d = await r.json()

if(d.status){

currentUser=document.getElementById("loginUsername").value

localStorage.setItem("token",d.token)
localStorage.setItem("username",currentUser)

document.getElementById("nickname").innerText=currentUser

openPage("dashboard")

}else{
alert(d.message)
}

}

function logout(){

localStorage.clear()

location.reload()

}

async function sendCode(){

const r = await fetch(API+"/send_code",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:currentUser,
phone:document.getElementById("phone").value,
api_id:document.getElementById("api_id").value,
api_hash:document.getElementById("api_hash").value,
proxy:document.getElementById("proxy").value,
use_proxy:document.getElementById("use_proxy").checked

})

})

const d = await r.json()

if(d.status){

auth_id=d.auth_id

document.getElementById("codeBlock").style.display="block"

}else{
alert(d.message)
}

}

async function verifyCode(){

const r = await fetch(API+"/verify_code",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

auth_id:auth_id,
code:document.getElementById("code").value

})

})

const d = await r.json()

if(d.need_password){

document.getElementById("passwordBlock").style.display="block"

return

}

if(d.status){

alert("Аккаунт подключен")

openPage("dashboard")

}else{
alert(d.message)
}

}

async function verifyPassword(){

const r = await fetch(API+"/verify_password",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

auth_id:auth_id,
password:document.getElementById("password2fa").value

})

})

const d = await r.json()

if(d.status){

alert("2FA успешно подтвержден")

openPage("dashboard")

}else{
alert(d.message)
}

}

async function loadAccounts(){

openPage("accountsPage")

const r = await fetch(API+"/accounts",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username:currentUser
})

})

const d = await r.json()

let html=""

d.accounts.forEach(acc=>{

html+=`
<div class="card acc">

<div>
${acc.phone}
</div>

<div>
<button onclick="deleteAccount(${acc.id})">
Удалить
</button>
</div>

</div>
`

})

document.getElementById("accountsList").innerHTML=html

}

async function deleteAccount(id){

await fetch(API+"/delete_account",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
account_id:id
})

})

function openPage(pageId) {
    // Скрываем абсолютно все блоки с классом page
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    // Показываем только нужный
    const target = document.getElementById(pageId);
    if (target) {
        target.classList.add('active');
    }
}
