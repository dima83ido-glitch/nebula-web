<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEBULA</title>
<style>
    body { background: #0d121d; font-family: 'Inter', sans-serif; color: #e2e8f0; margin:0; }
    .page { display: none; padding: 15px; }
    .page.active { display: block; }
    .container { max-width: 520px; margin: 0 auto; }
    .section-card, .chat-item {
        background: #111827; padding: 18px; border-radius: 16px; margin-bottom: 12px;
        border: 1px solid #1e293b;
    }
    .menu-btn {
        width: 100%; padding: 16px; margin: 8px 0; background: #0f172a; border: 1px solid #1e293b;
        color: #93c5fd; border-radius: 12px; cursor: pointer; font-weight: 600;
    }
    input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; background: #0b1120; border: 1px solid #334155; color: white; border-radius: 10px; }
    .back-btn { background:none; border:none; color:#94a3b8; font-size:18px; padding:10px 0; cursor:pointer; }
    .chat-item { cursor: pointer; padding: 12px; }
    .chat-item.selected { background: #1e3a8a; border-color: #3b82f6; }
    .counter { text-align:center; font-weight:bold; margin:15px 0; color:#60a5fa; }
</style>
</head>
<body>

<!-- DASHBOARD, LOGIN, ADD ACCOUNT, ACCOUNTS — оставил как было в прошлом сообщении -->

<!-- MAILINGS LIST -->
<div id="mailingsPage" class="page">
    <div class="container">
        <button class="back-btn" onclick="openPage('dashboard')">← Назад</button>
        <button class="menu-btn" style="background:#3b82f6" onclick="openPage('createMailingPage')">+ Создать новую рассылку</button>
        <div id="mailingsList"></div>
    </div>
</div>

<!-- CREATE / EDIT MAILING -->
<div id="createMailingPage" class="page">
    <div class="container">
        <button class="back-btn" onclick="openPage('mailingsPage')">← Назад</button>
        <h3 id="mailingTitle">Новая рассылка</h3>
        
        <input id="m_id" type="hidden">
        <input id="m_name" placeholder="Название рассылки">
        
        <textarea id="m_text1" placeholder="Текст 1"></textarea>
        <textarea id="m_text2" placeholder="Текст 2 (опц.)"></textarea>
        <textarea id="m_text3" placeholder="Текст 3 (опц.)"></textarea>
        
        <input id="m_interval" type="number" value="60" placeholder="Интервал (сек)">

        <select id="m_account" onchange="loadChatsForMailing()"></select>

        <button class="menu-btn" onclick="selectAllChats()">Выбрать все чаты</button>
        
        <div id="chatsList"></div>
        <div id="selectedCounter" class="counter">Выбрано чатов: 0</div>

        <button class="menu-btn" style="background:#22c55e; color:white;" onclick="saveMailing()">Сохранить рассылку</button>
    </div>
</div>

<script>
const API = "https://nebula-web-nwdf.onrender.com";
let currentUser = "", auth_id = "", currentEditId = null;
let selectedChats = [];

// openPage, login, sendCode и т.д. — как в предыдущей версии

async function loadMailings() {
    openPage("mailingsPage");
    const res = await fetch(API + "/mailings", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username: currentUser})
    });
    const d = await res.json();
    const container = document.getElementById("mailingsList");

    if (!d.mailings?.length) {
        container.innerHTML = `<div class="section-card">Пока нет рассылок</div>`;
        return;
    }

    let html = "";
    d.mailings.forEach(m => {
        html += `
        <div class="section-card">
            <strong>${m.name}</strong><br>
            <small>Аккаунт: ${m.phone} | Отправлено: ${m.sent}</small><br>
            <button onclick="editMailing(${m.id})" style="margin-top:8px; padding:8px 16px; background:#eab308;">Изменить</button>
            <button onclick="deleteMailing(${m.id})" style="margin-top:8px; padding:8px 16px; background:#ef4444; margin-left:8px;">Удалить</button>
        </div>`;
    });
    container.innerHTML = html;
}

async function deleteMailing(id) {
    if (!confirm("Удалить рассылку?")) return;
    await fetch(API + "/delete_mailing", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id})
    });
    loadMailings();
}

async function editMailing(id) {
    currentEditId = id;
    document.getElementById("mailingTitle").textContent = "Редактирование рассылки";
    openPage("createMailingPage");

    // Загрузить данные рассылки (можно улучшить, но для начала просто откроем форму)
    // При желании можно сделать отдельный запрос на одну рассылку
}

// ==================== ЧАТЫ ====================
async function loadAccountsForMailing() {
    const select = document.getElementById("m_account");
    const res = await fetch(API + "/accounts", { /* ... */ });
    // заполняем select
}

async function loadChatsForMailing() {
    const accountId = document.getElementById("m_account").value;
    if (!accountId) return;
    
    selectedChats = [];
    updateCounter();

    const res = await fetch(API + "/get_chats", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({account_id: parseInt(accountId)})
    });
    const d = await res.json();

    if (!d.chats) return;

    let html = "";
    d.chats.forEach(chat => {
        html += `
            <div class="chat-item" data-id="${chat.id}" onclick="toggleChat(this)">
                ${chat.title}
            </div>`;
    });
    document.getElementById("chatsList").innerHTML = html;
}

function toggleChat(el) {
    const id = el.dataset.id;
    if (selectedChats.includes(id)) {
        selectedChats = selectedChats.filter(x => x !== id);
        el.classList.remove("selected");
    } else {
        selectedChats.push(id);
        el.classList.add("selected");
    }
    updateCounter();
}

function selectAllChats() {
    document.querySelectorAll('.chat-item').forEach(el => {
        if (!el.classList.contains("selected")) {
            el.classList.add("selected");
            selectedChats.push(el.dataset.id);
        }
    });
    updateCounter();
}

function updateCounter() {
    document.getElementById("selectedCounter").textContent = `Выбрано чатов: ${selectedChats.length}`;
}

async function saveMailing() {
    const payload = {
        username: currentUser,
        account_id: parseInt(document.getElementById("m_account").value),
        name: document.getElementById("m_name").value,
        text1: document.getElementById("m_text1").value,
        text2: document.getElementById("m_text2").value,
        text3: document.getElementById("m_text3").value,
        interval: parseInt(document.getElementById("m_interval").value) || 60,
        chats: selectedChats
    };

    const url = currentEditId ? "/update_mailing" : "/create_mailing";
    if (currentEditId) payload.id = currentEditId;

    const res = await fetch(API + url, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    });
    const d = await res.json();

    if (d.status) {
        alert(currentEditId ? "Рассылка обновлена!" : "Рассылка создана!");
        currentEditId = null;
        openPage("mailingsPage");
        loadMailings();
    } else {
        alert(d.message);
    }
}
</script>
</body>
</html>
