<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEBULA</title>
<style>
    body { background: #0d121d; font-family: 'Inter', sans-serif; color: #e2e8f0; margin:0; padding-bottom: 80px; }
    .page { display: none; }
    .page.active { display: block; }
    .container { max-width: 520px; margin: 0 auto; padding: 15px; }
    .section-card, .chat-item {
        background: #111827; padding: 18px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #1e293b;
    }
    .section-header { font-size: 13px; font-weight: 800; color: #64748b; margin-bottom: 15px; text-transform: uppercase; }
    .menu-btn {
        width: 100%; padding: 16px; margin: 8px 0; background: #0f172a; border: 1px solid #1e293b;
        color: #93c5fd; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 16px;
    }
    input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; background: #0b1120; border: 1px solid #334155; color: white; border-radius: 10px; }
    textarea { height: 110px; resize: vertical; }
    .back-btn { background:none; border:none; color:#94a3b8; font-size:18px; padding:10px 0; cursor:pointer; }
    .chat-item { cursor: pointer; padding: 12px; }
    .chat-item.selected { background: #1e3a8a; border-color: #3b82f6; }
    .counter { text-align:center; font-weight:bold; margin:15px 0; color:#60a5fa; }
    .empty { text-align: center; color: #64748b; padding: 40px 20px; font-style: italic; }
    .loading { color: #60a5fa; text-align: center; padding: 20px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="page active">
    <div class="container">
        <h2>NEBULA LOGIN</h2>
        <input id="loginUsername" placeholder="Имя пользователя">
        <input id="loginPassword" type="password" placeholder="Пароль">
        <label><input type="checkbox" id="remember"> Запомнить меня</label>
        <button class="menu-btn" onclick="login()">Войти</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
    <div class="container">
        <h2>👤 <span id="nickname">Пользователь</span></h2>
        <div style="text-align: right; margin-bottom: 15px;">
    <button onclick="logout()" style="background:#ef4444; color:white; padding:8px 16px; border:none; border-radius:8px; cursor:pointer;">
        ВЫХОД
    </button>
</div>
        <div class="section-card">
            <div class="section-header">🧮 АККАУНТЫ</div>
            <button class="menu-btn" onclick="openPage('addAccountPage')">+ ДОБАВИТЬ АККАУНТ</button>
            <button class="menu-btn" onclick="loadAccounts()">📋 МОИ АККАУНТЫ</button>
        </div>
        <div class="section-card">
            <div class="section-header">🚀 РАССЫЛКИ</div>
            <button class="menu-btn" onclick="loadMailings()">📊 ВСЕ РАССЫЛКИ</button>
        </div>
    </div>
</div>

<!-- ADD ACCOUNT -->
<div id="addAccountPage" class="page">
    <div class="container">
        <button class="back-btn" onclick="openPage('dashboard')">← Назад</button>
        <h3>Добавление Telegram аккаунта</h3>
        
        <input id="phone" placeholder="+380XXXXXXXXX">
        <input id="api_id" placeholder="API ID">
        <input id="api_hash" placeholder="API HASH">
        
        <!-- Новый блок Прокси -->
        <div style="margin:15px 0; padding:12px; background:#1e293b; border-radius:12px;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <input type="checkbox" id="use_proxy">
                <span>Использовать прокси</span>
            </label>
            <input id="proxy" placeholder="http://user:pass@ip:port или socks5://..." style="margin-top:8px;">
        </div>

        <button class="menu-btn" onclick="sendCode()">Отправить код</button>

        <div id="codeBlock" style="display:none;">
            <input id="code" placeholder="Код из Telegram">
            <button class="menu-btn" onclick="verifyCode()">Подтвердить код</button>
        </div>
        <div id="passwordBlock" style="display:none;">
            <input id="password2fa" type="password" placeholder="2FA Пароль">
            <button class="menu-btn" onclick="verifyPassword()">Подтвердить 2FA</button>
        </div>
    </div>
</div>

<!-- MY ACCOUNTS -->
<div id="accountsPage" class="page">
    <div class="container">
        <button class="back-btn" onclick="openPage('dashboard')">← Назад</button>
        <h3>Мои аккаунты</h3>
        <div id="accountsList"></div>
    </div>
</div>

<!-- MAILINGS LIST -->
<div id="mailingsPage" class="page">
    <div class="container">
        <button class="back-btn" onclick="openPage('dashboard')">← Назад</button>
        <button class="menu-btn" style="background:#3b82f6" onclick="openPage('createMailingPage')">+ Создать новую рассылку</button>
        <div id="mailingsList"></div>
    </div>
</div>

<!-- CREATE / EDIT MAILING -->
<div id="createMailingPage" class="page">
    <div class="container">
        <button class="back-btn" onclick="openPage('mailingsPage')">← Назад</button>
        <h3 id="mailingTitle">Новая рассылка</h3>
        
        <input id="m_name" placeholder="Название рассылки">
        <textarea id="m_text1" placeholder="Текст 1"></textarea>
        <textarea id="m_text2" placeholder="Текст 2 (опционально)"></textarea>
        <textarea id="m_text3" placeholder="Текст 3 (опционально)"></textarea>
        <input id="m_interval" type="number" value="3" placeholder="Интервал (секунды)">

        <select id="m_account" onchange="loadChatsForMailing()"></select>
        <button class="menu-btn" onclick="selectAllChats()">Выбрать все чаты</button>
        
        <div id="chatsList"></div>
        <div id="selectedCounter" class="counter">Выбрано чатов: 0</div>

        <button class="menu-btn" style="background:#22c55e; color:white;" onclick="saveMailing()">Сохранить рассылку</button>
    </div>
</div>

<script>
const API = "https://nebula-web-nwdf.onrender.com";

let currentUser = "", auth_id = "", currentEditId = null;
let selectedChats = [];

// ==================== COMMON ====================
function openPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

// ==================== AUTH ====================
async function login() {
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value.trim();
    if (!username || !password) return alert("Введите логин и пароль!");

    try {
        const res = await fetch(API + "/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password, remember: true })
        });
        const d = await res.json();

        if (d.status) {
            currentUser = username;
            document.getElementById("nickname").innerText = username;
            openPage("dashboard");
        } else {
            alert(d.message || "Ошибка входа");
        }
    } catch (err) {
        alert("Не удалось подключиться к серверу");
    }
}

// ==================== ADD ACCOUNT ====================
async function sendCode() {
    const res = await fetch(API + "/send_code", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: currentUser,
            phone: document.getElementById("phone").value.trim(),
            api_id: document.getElementById("api_id").value.trim(),
            api_hash: document.getElementById("api_hash").value.trim()
        })
    });
    const d = await res.json();
    if (d.status) {
        auth_id = d.auth_id;
        document.getElementById("codeBlock").style.display = "block";
    } else alert(d.message);
}

async function verifyCode() {
    const res = await fetch(API + "/verify_code", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({auth_id, code: document.getElementById("code").value.trim()})
    });
    const d = await res.json();
    if (d.need_password) document.getElementById("passwordBlock").style.display = "block";
    else if (d.status) { alert("Аккаунт добавлен!"); openPage("dashboard"); }
    else alert(d.message);
}

async function verifyPassword() {
    const res = await fetch(API + "/verify_password", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({auth_id, password: document.getElementById("password2fa").value.trim()})
    });
    const d = await res.json();
    if (d.status) { alert("Аккаунт добавлен!"); openPage("dashboard"); }
    else alert(d.message);
}

// ==================== ACCOUNTS ====================
async function loadAccounts() {
    openPage("accountsPage");
    try {
        const res = await fetch(API + "/accounts", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username: currentUser})
        });
        const d = await res.json();
        const list = document.getElementById("accountsList");

        if (!d.accounts || d.accounts.length === 0) {
            list.innerHTML = `<div class="empty">Нет добавленных аккаунтов</div>`;
            return;
        }

        let html = "";
        d.accounts.forEach(acc => {
            html += `<div class="section-card"><strong>${acc.phone}</strong> 
                     <button onclick="deleteAccount(${acc.id})" style="float:right;color:#f87171">Удалить</button></div>`;
        });
        list.innerHTML = html;
    } catch(e) {
        document.getElementById("accountsList").innerHTML = `<div class="empty">Ошибка загрузки</div>`;
    }
}

async function deleteAccount(id) {
    if (confirm("Удалить аккаунт?")) {
        await fetch(API + "/delete_account", {
            method:"POST", 
            headers:{"Content-Type":"application/json"}, 
            body:JSON.stringify({account_id:id})
        });
        loadAccounts();
    }
}

// ==================== MAILINGS ====================
async function loadMailings() {
    openPage("mailingsPage");
    try {
        const res = await fetch(API + "/mailings", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username: currentUser})
        });
        const d = await res.json();
        const container = document.getElementById("mailingsList");

        if (!d.mailings || d.mailings.length === 0) {
            container.innerHTML = `<div class="empty">Пока нет рассылок</div>`;
            return;
        }

        let html = "";
        d.mailings.forEach(m => {
            const isActive = m.status === "active";
            html += `
            <div class="section-card">
                <strong>${m.name}</strong><br>
                <small>Аккаунт: ${m.phone} | Отправлено: ${m.sent}</small><br><br>
                <button onclick="toggleMailing(${m.id}, '${isActive ? "stopped" : "active"}')" 
                        style="background:${isActive ? '#ef4444' : '#22c55e'}; color:white; padding:8px 14px;">
                    ${isActive ? '⏹ Остановить' : '▶ Запустить'}
                </button>
                <button onclick="editMailing(${m.id})" style="background:#eab308; padding:8px 14px; margin-left:8px;">Изменить</button>
                <button onclick="deleteMailing(${m.id})" style="background:#ef4444; padding:8px 14px; margin-left:8px;">Удалить</button>
            </div>`;
        });
        container.innerHTML = html;
    } catch(e) {
        document.getElementById("mailingsList").innerHTML = `<div class="empty">Ошибка загрузки</div>`;
    }
}

async function toggleMailing(id, status) {
    const res = await fetch(API + "/toggle_mailing", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({id, status})
    });
    const d = await res.json();
    if (d.status) loadMailings();
    else alert("Ошибка");
}

async function deleteMailing(id) {
    if (!confirm("Удалить рассылку?")) return;
    await fetch(API + "/delete_mailing", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({id})});
    loadMailings();
}

async function editMailing(id) {
    currentEditId = id;
    document.getElementById("mailingTitle").textContent = "Редактирование рассылки";
    openPage("createMailingPage");
}

// ==================== CREATE/EDIT MAILING ====================
async function loadAccountsForMailing() {
    const select = document.getElementById("m_account");
    select.innerHTML = '<option value="">Загрузка аккаунтов...</option>';

    try {
        const res = await fetch(API + "/accounts", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username: currentUser})
        });
        const d = await res.json();
        
        select.innerHTML = '<option value="">Выберите аккаунт</option>';
        if (d.accounts && d.accounts.length > 0) {
            d.accounts.forEach(acc => {
                select.innerHTML += `<option value="${acc.id}">${acc.phone}</option>`;
            });
        } else {
            select.innerHTML += `<option value="">Нет добавленных аккаунтов</option>`;
        }
    } catch (e) {
        select.innerHTML = '<option value="">Ошибка загрузки</option>';
    }
}

async function loadChatsForMailing() {
    const accountId = document.getElementById("m_account").value;
    if (!accountId) return;

    selectedChats = [];
    updateCounter();

    const chatsList = document.getElementById("chatsList");
    chatsList.innerHTML = `<p class="loading">Загрузка чатов с Telegram...</p>`;

    try {
        const res = await fetch(API + "/get_chats", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({account_id: parseInt(accountId)})
        });
        
        const d = await res.json();

        if (!d.status) {
            chatsList.innerHTML = `<p style="color:#f87171">Ошибка: ${d.message || 'Не удалось загрузить чаты'}</p>`;
            return;
        }

        if (!d.chats || d.chats.length === 0) {
            chatsList.innerHTML = `<p style="color:#f87171">Чатов не найдено на этом аккаунте</p>`;
            return;
        }

        let html = "";
        d.chats.forEach(chat => {
            html += `<div class="chat-item" data-id="${chat.id}" onclick="toggleChat(this)">${chat.title}</div>`;
        });
        chatsList.innerHTML = html;
    } catch (e) {
        chatsList.innerHTML = `<p style="color:#f87171">Ошибка соединения с сервером</p>`;
        console.error(e);
    }
}

function toggleChat(el) {
    const id = el.dataset.id;
    if (selectedChats.includes(id)) {
        selectedChats = selectedChats.filter(x => x !== id);
        el.classList.remove("selected");
    } else {
        selectedChats.push(id);
        el.classList.add("selected");
    }
    updateCounter();
}

function selectAllChats() {
    document.querySelectorAll('.chat-item').forEach(el => {
        if (!el.classList.contains("selected")) {
            el.classList.add("selected");
            selectedChats.push(el.dataset.id);
        }
    });
    updateCounter();
}

function updateCounter() {
    document.getElementById("selectedCounter").textContent = `Выбрано чатов: ${selectedChats.length}`;
}

async function saveMailing() {
    const account_id = document.getElementById("m_account").value;
    if (!account_id) return alert("Выберите аккаунт!");

    const payload = {
        username: currentUser,
        account_id: parseInt(account_id),
        name: document.getElementById("m_name").value || "Рассылка",
        text1: document.getElementById("m_text1").value,
        text2: document.getElementById("m_text2").value,
        text3: document.getElementById("m_text3").value,
        interval: parseInt(document.getElementById("m_interval").value) || 3,
        chats: selectedChats
    };

    const url = currentEditId ? "/update_mailing" : "/create_mailing";
    if (currentEditId) payload.id = currentEditId;

    const res = await fetch(API + url, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    });
    const d = await res.json();

    if (d.status) {
        alert(currentEditId ? "Рассылка обновлена!" : "Рассылка создана!");
        currentEditId = null;
        openPage("mailingsPage");
        loadMailings();
    } else alert(d.message || "Ошибка");
}

// Инициализация
document.addEventListener("DOMContentLoaded", () => {
    const createPage = document.getElementById("createMailingPage");
    const observer = new MutationObserver(() => {
        if (createPage.classList.contains('active')) {
            loadAccountsForMailing();
        }
    });
    observer.observe(createPage, { attributes: true, attributeFilter: ['class'] });
});

// Выход из аккаунта
function logout() {
    if (confirm("Выйти из кабинета?")) {
        currentUser = "";
        openPage("loginPage");
    }
}

// Обновлённая функция отправки кода с прокси
async function sendCode() {
    const proxy = document.getElementById("proxy").value.trim();
    const useProxy = document.getElementById("use_proxy").checked;

    const res = await fetch(API + "/send_code", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: currentUser,
            phone: document.getElementById("phone").value.trim(),
            api_id: document.getElementById("api_id").value.trim(),
            api_hash: document.getElementById("api_hash").value.trim(),
            proxy: useProxy ? proxy : null
        })
    });
    const d = await res.json();
    if (d.status) {
        auth_id = d.auth_id;
        document.getElementById("codeBlock").style.display = "block";
    } else alert(d.message);
}
</script>
</body>
</html>
