<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NEBULA</title>
<style>
    body {
        background: #0d121d;
        font-family: 'Inter', sans-serif;
        color: #e2e8f0;
        margin: 0;
        padding-bottom: 80px;
    }
    .page { display: none; }
    .page.active { display: block; }
    .container { max-width: 500px; margin: 0 auto; padding: 15px; }
    
    .section-card {
        background: #111827;
        padding: 20px;
        border-radius: 20px;
        margin-bottom: 20px;
        border: 1px solid #1e293b;
    }
    .section-header {
        font-size: 13px;
        font-weight: 800;
        color: #64748b;
        margin-bottom: 15px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .menu-btn {
        width: 100%;
        padding: 16px;
        margin: 8px 0;
        background: #0f172a;
        border: 1px solid #1e293b;
        color: #93c5fd;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        font-size: 16px;
        transition: all 0.2s;
    }
    .menu-btn:hover {
        background: #1e293b;
        transform: translateY(-2px);
    }
    input, textarea, select {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        background: #0b1120;
        border: 1px solid #334155;
        color: white;
        border-radius: 10px;
        box-sizing: border-box;
        font-size: 16px;
    }
    textarea { height: 100px; resize: vertical; }
    .back-btn {
        background: none;
        border: none;
        color: #94a3b8;
        font-size: 18px;
        padding: 10px 0;
        cursor: pointer;
    }
    .empty {
        text-align: center;
        color: #64748b;
        padding: 40px 20px;
        font-style: italic;
    }
    h2, h3 { margin: 10px 0 20px 0; }
</style>
</head>
<body>

<!-- ==================== LOGIN ==================== -->
<div id="loginPage" class="page active">
    <div class="container">
        <h2>NEBULA LOGIN</h2>
        <input id="loginUsername" placeholder="Username">
        <input id="loginPassword" type="password" placeholder="Password">
        <label style="display:block; margin:10px 0;">
            <input type="checkbox" id="remember"> Remember me
        </label>
        <button class="menu-btn" onclick="login()">Войти</button>
    </div>
</div>

<!-- ==================== DASHBOARD ==================== -->
<div id="dashboard" class="page">
    <div class="container">
        <h2>👤 <span id="nickname">Пользователь</span></h2>

        <div class="section-card">
            <div class="section-header">🧮 АККАУНТЫ</div>
            <button class="menu-btn" onclick="openPage('addAccountPage')">
                <span style="font-size:22px;">+</span> ДОБАВИТЬ АККАУНТ
            </button>
            <button class="menu-btn" onclick="loadAccounts()">
                📋 МОИ АККАУНТЫ
            </button>
        </div>

        <div class="section-card">
            <div class="section-header">🚀 РАССЫЛКИ</div>
            <button class="menu-btn" onclick="loadMailings()">
                📊 ВСЕ РАССЫЛКИ
            </button>
        </div>

        <div style="text-align:center; margin-top:30px; color:#475569;">
            @orion_raccil_bot
        </div>
    </div>
</div>

<!-- ==================== ADD ACCOUNT ==================== -->
<div id="addAccountPage" class="page">
    <div class="container">
        <button class="back-btn" onclick="openPage('dashboard')">← Назад</button>
        <h3>Добавление Telegram аккаунта</h3>
        
        <input id="phone" placeholder="+380XXXXXXXXX">
        <input id="api_id" placeholder="API ID">
        <input id="api_hash" placeholder="API HASH">
        
        <button class="menu-btn" onclick="sendCode()">Отправить код</button>

        <div id="codeBlock" style="display:none;">
            <input id="code" placeholder="Код из Telegram">
            <button class="menu-btn" onclick="verifyCode()">Подтвердить код</button>
        </div>

        <div id="passwordBlock" style="display:none;">
            <input id="password2fa" type="password" placeholder="Пароль 2FA">
            <button class="menu-btn" onclick="verifyPassword()">Подтвердить 2FA</button>
        </div>
    </div>
</div>

<!-- ==================== MY ACCOUNTS ==================== -->
<div id="accountsPage" class="page">
    <div class="container">
        <button class="back-btn" onclick="openPage('dashboard')">← Назад</button>
        <h3>Мои аккаунты</h3>
        <div id="accountsList"></div>
    </div>
</div>

<!-- ==================== MAILINGS LIST ==================== -->
<div id="mailingsPage" class="page">
    <div class="container">
        <button class="back-btn" onclick="openPage('dashboard')">← Назад</button>
        <button class="menu-btn" style="background:#3b82f6; color:white;" onclick="openPage('createMailingPage')">
            + Создать новую рассылку
        </button>
        <div id="mailingsList"></div>
    </div>
</div>

<!-- ==================== CREATE MAILING ==================== -->
<div id="createMailingPage" class="page">
    <div class="container">
        <button class="back-btn" onclick="openPage('mailingsPage')">← Назад</button>
        <h3>Новая рассылка</h3>
        
        <input id="m_name" placeholder="Название рассылки">
        
        <textarea id="m_text1" placeholder="Текст сообщения 1"></textarea>
        <textarea id="m_text2" placeholder="Текст сообщения 2 (опционально)"></textarea>
        <textarea id="m_text3" placeholder="Текст сообщения 3 (опционально)"></textarea>
        
        <input id="m_interval" type="number" value="60" placeholder="Интервал между сообщениями (секунды)">
        
        <select id="m_account">
            <option value="">Выберите аккаунт</option>
        </select>

        <button class="menu-btn" style="background:#22c55e; color:white;" onclick="saveMailing()">
            Запустить рассылку
        </button>
    </div>
</div>

<script>
const API = "https://nebula-web-nwdf.onrender.com"; // ← ИЗМЕНИ НА СВОЙ

let currentUser = "";
let auth_id = "";

// Переключение страниц
function openPage(pageId) {
    document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

// ==================== AUTH ====================
async function login() {
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value.trim();

    if (!username || !password) return alert("Введите логин и пароль");

    const res = await fetch(API + "/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password, remember: true })
    });
    const d = await res.json();

    if (d.status) {
        currentUser = username;
        document.getElementById("nickname").innerText = username;
        openPage("dashboard");
    } else {
        alert(d.message || "Ошибка входа");
    }
}

// ==================== ADD ACCOUNT ====================
async function sendCode() {
    const res = await fetch(API + "/send_code", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: currentUser,
            phone: document.getElementById("phone").value.trim(),
            api_id: document.getElementById("api_id").value.trim(),
            api_hash: document.getElementById("api_hash").value.trim()
        })
    });
    const d = await res.json();
    if (d.status) {
        auth_id = d.auth_id;
        document.getElementById("codeBlock").style.display = "block";
        alert("Код отправлен в Telegram");
    } else {
        alert(d.message);
    }
}

async function verifyCode() {
    const res = await fetch(API + "/verify_code", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            auth_id: auth_id,
            code: document.getElementById("code").value.trim()
        })
    });
    const d = await res.json();
    if (d.need_password) {
        document.getElementById("passwordBlock").style.display = "block";
    } else if (d.status) {
        alert("Аккаунт успешно добавлен!");
        openPage("dashboard");
    } else {
        alert(d.message);
    }
}

async function verifyPassword() {
    const res = await fetch(API + "/verify_password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            auth_id: auth_id,
            password: document.getElementById("password2fa").value.trim()
        })
    });
    const d = await res.json();
    if (d.status) {
        alert("Аккаунт успешно добавлен!");
        openPage("dashboard");
    } else {
        alert(d.message);
    }
}

// ==================== ACCOUNTS ====================
async function loadAccounts() {
    openPage("accountsPage");
    const res = await fetch(API + "/accounts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: currentUser })
    });
    const d = await res.json();
    const list = document.getElementById("accountsList");

    if (!d.accounts || d.accounts.length === 0) {
        list.innerHTML = `<div class="empty">Нет добавленных аккаунтов</div>`;
        return;
    }

    let html = "";
    d.accounts.forEach(acc => {
        html += `
            <div class="section-card">
                <strong>${acc.phone}</strong>
                <button onclick="deleteAccount(${acc.id})" style="float:right; color:#f87171; background:none; border:none; cursor:pointer;">Удалить</button>
            </div>`;
    });
    list.innerHTML = html;
}

async function deleteAccount(id) {
    if (!confirm("Удалить этот аккаунт?")) return;
    await fetch(API + "/delete_account", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ account_id: id })
    });
    loadAccounts();
}

// ==================== MAILINGS ====================
async function loadMailings() {
    openPage("mailingsPage");
    const res = await fetch(API + "/mailings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: currentUser })
    });
    const d = await res.json();
    const list = document.getElementById("mailingsList");

    if (!d.mailings || d.mailings.length === 0) {
        list.innerHTML = `<div class="empty">Пока нет рассылок</div>`;
        return;
    }

    let html = "";
    d.mailings.forEach(m => {
        html += `
            <div class="section-card">
                <strong>${m.name}</strong><br>
                <small>Аккаунт: ${m.phone} | Отправлено: ${m.sent}</small>
            </div>`;
    });
    list.innerHTML = html;
}

async function loadAccountsForMailing() {
    const select = document.getElementById("m_account");
    const res = await fetch(API + "/accounts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: currentUser })
    });
    const d = await res.json();
    
    select.innerHTML = '<option value="">Выберите аккаунт</option>';
    if (d.accounts) {
        d.accounts.forEach(acc => {
            select.innerHTML += `<option value="${acc.id}">${acc.phone}</option>`;
        });
    }
}

async function saveMailing() {
    const account_id = document.getElementById("m_account").value;
    if (!account_id) return alert("Выберите аккаунт!");

    const res = await fetch(API + "/create_mailing", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: currentUser,
            account_id: parseInt(account_id),
            name: document.getElementById("m_name").value,
            text1: document.getElementById("m_text1").value,
            text2: document.getElementById("m_text2").value,
            text3: document.getElementById("m_text3").value,
            interval: parseInt(document.getElementById("m_interval").value) || 60,
            chats: [] // пока пусто, позже можно добавить выбор чатов
        })
    });
    const d = await res.json();
    if (d.status) {
        alert("Рассылка создана!");
        openPage("mailingsPage");
        loadMailings();
    } else {
        alert(d.message);
    }
}

// Инициализация
document.addEventListener("DOMContentLoaded", () => {
    // Загружаем список аккаунтов при открытии страницы создания рассылки
    const createPage = document.getElementById("createMailingPage");
    createPage.addEventListener("click", () => {
        if (createPage.classList.contains("active")) {
            loadAccountsForMailing();
        }
    });
});
</script>
</body>
</html>
